<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일간 운반비 보고서</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#1f3a5f; --navy-dark:#16293f; --blue:#2563eb;
  --bg:#eef0f3; --card:#ffffff; --line:#d9dde3; --line-soft:#e8eaee;
  --text:#1c2330; --muted:#6b7585;
  --warn-bg:#fff7e0; --warn-line:#e6c860;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Malgun Gothic","맑은 고딕","Apple SD Gothic Neo",system-ui,sans-serif;
  background:var(--bg); color:var(--text); font-size:13px; line-height:1.5;
}
.page{max-width:1280px;margin:0 auto;padding:18px 20px 60px}
.topstrip{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);padding:4px 2px 10px}

.uploader{
  background:var(--card);border:1px dashed #b7bfc9;border-radius:8px;
  padding:12px 18px;margin-bottom:12px;
}
.urow{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.urow+.urow{margin-top:9px;padding-top:9px;border-top:1px dashed var(--line-soft)}
.nav-btn{
  border:1px solid var(--line);background:#fff;color:var(--navy);border-radius:4px;
  font-size:11px;padding:5px 9px;cursor:pointer;font-family:inherit;font-weight:700;
}
.nav-btn:hover{background:#eef2f8;border-color:var(--navy)}
.uploader .lbl{font-weight:700;color:var(--navy)}
.uploader input[type=file]{font-size:12px}
.btn{border:1px solid var(--navy);background:var(--navy);color:#fff;border-radius:5px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:600}
.btn.secondary{background:#fff;color:var(--navy)}
.btn.editing{background:#d97706;border-color:#d97706;color:#fff}
.status{font-size:12px;color:var(--muted)}
.status.err{color:#c0392b;font-weight:600}

/* tabs */
.tabs{display:flex;gap:6px;margin-bottom:0}
.tab{
  border:1px solid var(--line);border-bottom:none;background:#dfe3e9;color:#5a6474;
  border-radius:8px 8px 0 0;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;
  font-family:inherit;
}
.tab .tcnt{font-size:11px;font-weight:700;color:var(--blue);margin-left:5px}
.tab.active{background:var(--card);color:var(--navy);position:relative;top:1px}

.report{background:var(--card);border:1px solid var(--line);border-radius:0 8px 8px 8px;padding:22px 26px 30px;box-shadow:0 1px 2px rgba(20,30,50,.05)}
h1{font-size:19px;font-weight:800;letter-spacing:-.3px;padding-bottom:10px;border-bottom:2px solid var(--navy);margin-bottom:8px}
h1 .datepart{font-weight:600;font-size:15px;color:var(--navy)}
.meta{font-size:11.5px;color:var(--muted);margin-bottom:18px}
.meta b{color:var(--text);font-weight:600}
.meta span+span::before{content:"|";margin:0 8px;color:#c6ccd4}

.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:22px}
.card{background:#fafbfc;border:1px solid var(--line);border-radius:7px;padding:10px 14px;min-height:74px}
.card .k{font-size:11px;color:var(--muted);margin-bottom:2px}
.card .v{font-size:19px;font-weight:800;letter-spacing:-.3px}
.card .v small{font-size:12px;font-weight:700}
.card .sub{font-size:11.5px;color:var(--blue);font-weight:700;margin-top:1px}
.card.dim .v,.card.dim .sub{color:#9aa3b0}

h2{font-size:14px;font-weight:800;margin:26px 0 10px;display:flex;align-items:center;gap:6px}
h2 .num{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border:1.5px solid var(--text);border-radius:50%;font-size:11px;font-weight:800}
.note{font-size:11px;color:var(--muted);margin:-4px 0 8px}

table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{background:var(--navy);color:#fff;font-weight:700;font-size:12px;padding:8px 10px;text-align:center;border:1px solid var(--navy-dark);white-space:nowrap}
tbody td{padding:7px 10px;border:1px solid var(--line-soft);vertical-align:middle}
.num-cell{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.num-cell b{color:var(--blue)}
.cnt{color:var(--blue);font-weight:700;font-size:11.5px}
.zero, .zero b, .zero .cnt{color:#a6aeba !important;font-weight:400}
tr.branch td{background:#f2f4f7;font-weight:800}
tr.branch td:first-child::before{content:"▣";margin-right:7px;color:var(--navy);font-size:11px}
tr.staff td:first-child{padding-left:26px;color:#3b4454}
tr.staff td:first-child::before{content:"ㄴ";margin-right:7px;color:#9aa3b0}
tr.total td{background:var(--navy);color:#fff;font-weight:800;border-color:var(--navy-dark)}
tr.total td b,tr.total .cnt{color:#ffd35c}
td.grp{background:#e9edf3;font-weight:800}
td.grp2{background:#f2f4f7;font-weight:700}
tr.subtotal td{background:#fff6c9;font-weight:800;border-color:#ecd98a}
tr.subtotal td b{color:var(--text)}
tr.subtotal .cnt{color:#8a6d1a}

.detail-wrap{overflow-x:auto}
.detail{width:100%;table-layout:auto}
.detail th{font-size:11px;padding:6px 5px}
.detail td{font-size:11.5px;padding:4px 5px}
.detail td:nth-child(1){width:32px}
.detail .ecell[data-f="client"],.detail .ecell[data-f="dest"]{display:block;min-width:140px;max-width:230px}
.detail .ecell[data-f="date"]{white-space:nowrap;font-size:11px}
.detail .ecell[data-f="branch"]{min-width:30px}
.detail .mini-btn.ok{display:block;margin:3px auto 0;padding:1px 6px;font-size:10px}
.detail .c{text-align:center;white-space:nowrap}
.detail td.wide{min-width:140px;max-width:240px}
.detail tr.flagged td{background:var(--warn-bg)}
.detail tr.flagged td:first-child{border-left:3px solid var(--warn-line)}
.flag-note{margin-top:8px;font-size:11.5px;color:#8a6d1a;background:var(--warn-bg);border:1px solid var(--warn-line);border-radius:5px;padding:7px 12px;display:inline-block}
.nf-note{margin:-12px 0 20px;font-size:12px;color:#2d4a73;background:#eef4fb;border:1px solid #c7d9ee;border-radius:5px;padding:7px 12px}
.nf-note b{color:var(--navy)}
.dtbar select{font-size:11.5px;padding:3px 6px;border:1px solid var(--line);border-radius:4px;font-family:inherit;max-width:280px}
.filter-chip{display:inline-block;font-size:12px;font-weight:700;color:#fff;background:var(--blue);border-radius:4px;padding:2px 10px;vertical-align:middle;margin-left:4px}
@media print{ .dtbar{display:none} }
.dtype-chip{display:inline-block;font-size:10.5px;background:#eef2f8;color:var(--navy);border:1px solid #cdd8e6;border-radius:3px;padding:0 5px;white-space:nowrap}

/* edit mode */
.edit-badge{font-size:10.5px;font-weight:700;color:#fff;background:#d97706;border-radius:4px;padding:2px 8px;vertical-align:middle;margin-left:6px}
.editbar{display:flex;align-items:center;gap:12px;margin-bottom:8px;background:#fdf6ea;border:1px solid #edd9a8;border-radius:6px;padding:7px 12px}
.edit-hint{font-size:11.5px;color:#8a6d1a}
.ecell{display:inline-block;min-width:28px;min-height:16px;border-bottom:1px dashed #b9c2cf;padding:0 2px;cursor:text;outline:none}
.ecell:focus{background:#eef4ff;border-bottom:1.5px solid var(--blue)}
.ecell.num{font-weight:700;color:var(--blue)}
.einp{font-size:11.5px;padding:2px 4px;border:1px solid var(--line);border-radius:4px;font-family:inherit;background:#fff}
.einp:focus{outline:none;border-color:var(--blue);background:#eef4ff}
.einp.w-veh{width:54px}
.einp.w-typ{width:60px}
.einp.w-per{width:88px}
.mini-btn{border:1px solid var(--line);background:#fff;border-radius:4px;font-size:11px;padding:2px 7px;cursor:pointer;font-family:inherit}
.mini-btn.del{color:#c0392b;border-color:#e2b4ae}
.mini-btn.del:hover{background:#fbeae7}
.mini-btn.ok{color:#8a6d1a;border-color:#e6c860;margin-left:4px;background:var(--warn-bg)}
.mini-btn.ok:hover{background:#fdefc4}
.mini-btn.add{color:var(--navy);border-color:var(--navy);font-weight:700;padding:4px 12px}
.mini-btn.add:hover{background:#eef2f8}
.mini-btn.edit-toggle{font-size:12px;padding:4px 14px;font-weight:700;color:var(--navy);border-color:var(--navy)}
.mini-btn.edit-toggle:hover{background:#eef2f8}
.mini-btn.edit-toggle.editing{background:#d97706;border-color:#d97706;color:#fff}

.confirm{margin-top:34px;padding-top:16px;border-top:1px solid var(--line);font-size:12.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
.confirm .sign{color:var(--muted)}
.confirm .sign b{color:var(--text);letter-spacing:8px;margin-left:6px}
.pagefoot{display:flex;justify-content:space-between;font-size:10.5px;color:#a0a8b3;margin-top:10px;padding:0 4px}

@media print{
  body{background:#fff}
  body.print-brief .sec-detail{display:none !important}
  .sec1{break-after:page;page-break-after:always}
  .sec1 table{max-width:100% !important}
  body:not(.print-brief) .sec2{break-after:page;page-break-after:always}
  .sec2 h2,.sec-detail h2{break-after:avoid}
  tr{break-inside:avoid;page-break-inside:avoid}
  /* ── 2섹션 한 페이지 맞춤: 열간격·글자 압축 ── */
  .sec2 h2{margin:6px 0 6px}
  .sec2 .note{display:none}
  .sec2 table{font-size:10.5px}
  .sec2 thead th{padding:4px 6px;font-size:10px;line-height:1.25}
  .sec2 thead th span{font-size:9px !important}
  .sec2 tbody td{padding:2.5px 7px;line-height:1.3}
  .sec2 .cnt{font-size:10px}
  /* 행이 매우 많은 경우(50행 초과) 한 단계 더 축소 */
  body.print-dense .sec2 table{font-size:9.5px}
  body.print-dense .sec2 tbody td{padding:1.5px 6px;line-height:1.2}
  body.print-dense .sec2 thead th{padding:3px 5px;font-size:9.5px}
  body.print-dense .sec2 .cnt{font-size:9px}
  .uploader,.tabs,.editbar,.edit-only,.edit-badge,.mini-btn{display:none !important}
  .page{padding:0;max-width:none}
  .report{border:none;box-shadow:none;padding:10px 4px;border-radius:0}
  thead th,tr.branch td,tr.total td,.detail tr.flagged td{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .ecell{border-bottom:none}
  .einp{border:none;background:transparent;width:auto}
}
@media (max-width:900px){ .cards{grid-template-columns:repeat(3,1fr)} }

/* 로그인 */
#loginOverlay{position:fixed;inset:0;background:rgba(22,30,45,.55);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:#fff;border-radius:12px;padding:32px 30px 26px;width:340px;box-shadow:0 12px 40px rgba(0,0,0,.25);text-align:center}
.login-title{font-size:18px;font-weight:800;color:var(--navy)}
.login-sub{font-size:12px;color:var(--muted);margin:6px 0 20px}
.login-box input{width:100%;font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:6px;margin-bottom:10px;font-family:inherit}
.login-box input:focus{outline:none;border-color:var(--blue)}
.login-btn{width:100%;padding:11px;font-size:14px;margin-top:4px}
.login-msg{font-size:12px;color:#c0392b;margin-top:10px;min-height:16px;font-weight:600}
#userBar .role-chip{display:inline-block;font-size:10.5px;font-weight:700;color:#fff;border-radius:4px;padding:1px 7px;margin:0 6px}
#userBar .role-admin{background:#d97706}
#userBar .role-staff{background:#5a6474}
#userBar a{color:var(--blue);cursor:pointer;text-decoration:underline;font-size:11px}
.cloud-save{background:#0b8043;border-color:#0b8043}
.cloud-save:disabled{background:#b8c2cc;border-color:#b8c2cc;cursor:not-allowed}
#cloudStatus.ok{color:#0b8043;font-weight:600}
#cloudStatus.err{color:#c0392b;font-weight:600}
body.role-staff .cloud-save,
body.role-staff #fileInput,
body.role-staff #btnReset,
body.role-staff .edit-toggle,
body.role-staff #cloudRow .lbl+ #btnCloudSave{ }
body.role-staff .staff-hide{display:none !important}
</style>
</head>
<body>
<!-- 로그인 오버레이 -->
<div id="loginOverlay">
  <div class="login-box">
    <div class="login-title">대성하우징 운반비 보고서</div>
    <div class="login-sub">사내 공용 계정으로 로그인하세요</div>
    <input type="text" id="loginId" placeholder="아이디" autocomplete="username">
    <input type="password" id="loginPw" placeholder="비밀번호" autocomplete="current-password">
    <button class="btn login-btn" id="loginBtn">로그인</button>
    <div class="login-msg" id="loginMsg"></div>
  </div>
</div>

<div class="page">
  <div class="topstrip">
    <span id="printDate"></span>
    <span id="userBar"></span>
  </div>

  <div class="uploader">
    <div class="urow">
      <span class="lbl">보고서 기간</span>
      <select id="periodMode" style="font-size:12px;padding:4px 6px;border:1px solid var(--line);border-radius:4px;font-family:inherit">
        <option value="day">일간</option>
        <option value="week">주간</option>
        <option value="month">월간</option>
        <option value="range">기간</option>
      </select>
      <button class="nav-btn" id="navPrev" title="이전 기간">◀</button>
      <input type="date" id="dateA" style="font-size:12px;padding:4px 6px;border:1px solid var(--line);border-radius:4px">
      <button class="nav-btn" id="navNext" title="다음 기간">▶</button>
      <span id="rangeSep" style="display:none;color:var(--muted)">~</span>
      <input type="date" id="dateB" style="display:none;font-size:12px;padding:4px 6px;border:1px solid var(--line);border-radius:4px">
      <span id="weekInfo" style="display:none;font-size:11.5px;color:var(--blue);font-weight:700"></span>
      <span class="lbl">원데이터 업로드</span>
      <input type="file" id="fileInput" accept=".xlsx,.xls">
      <button class="btn secondary" id="btnReset">전체 지우기</button>
      <button class="btn" id="btnDownload">엑셀 다운로드 (2개 탭)</button>
    </div>
    <div class="urow" id="cloudRow">
      <span class="lbl">구글시트</span>
      <button class="btn secondary" id="btnCloudLoad">이 기간 불러오기</button>
      <button class="btn cloud-save" id="btnCloudSave">이 날짜로 저장</button>
      <span class="status" id="cloudStatus"></span>
    </div>
    <div class="urow">
      <button class="btn secondary" id="btnPrintBrief" title="①지점별 합계 + ②지점별·개인별 종합만 출력">인쇄/PDF (간략 ①②)</button>
      <button class="btn secondary" id="btnPrintFull" title="①②③ 상세내역까지 모두 출력">인쇄/PDF (종합 ①②③)</button>
      <span class="status" id="status"></span>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="report" id="report"></div>

  <datalist id="vehicleList"></datalist>
  <datalist id="typeList"></datalist>
  <datalist id="staffList"></datalist>
  <datalist id="repList"></datalist>

  <div class="pagefoot"><span>about:blank</span><span>1/1</span></div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════
 *  구글시트 연동 설정 — API_URL 에 Apps Script 웹앱 배포 URL 붙여넣기
 * ══════════════════════════════════════════════════════════════ */
const API_URL = "https://script.google.com/macros/s/AKfycbybwkcJ2WYsDCqbp9OtH2BSxHSLX-hxWhah0d8xcOoYDVqIrrYQ1VAO7itB-OM3OPMh/exec";
let SESSION = { id:null, role:null, token:null };
async function apiCall(payload){
  if (!API_URL) throw new Error("구글시트 주소(API_URL)가 설정되지 않았습니다.");
  const res = await fetch(API_URL, {
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "요청이 실패했습니다.");
  return data;
}

/* ═══════ 기본 내장 데이터 (2026-07-15 원데이터 변환본) ═══════ */
const DEFAULT_RECORDS = [];
const DEFAULT_TITLE_DATE = new Date().toISOString().slice(0,10);

/* ═══════ 콤보박스 목록 (지난 6개월 데이터 기준) ═══════ */
const VOCAB = {"staff": ["김한솔(창동)", "신동수(포천)", "이은아(창동)", "한강수(창동)", "최종혁(포천)", "김진형(포천)", "김희규(창동)", "김영미(창동)", "방윤경(물류)", "우종규(포천)", "박기완(포천)", "홍순호(포천)", "고충현(포천)", "서동숙(특판)", "김건오(포천)", "이수진(총무)", "박서하(특판)", "이은숙(총무)", "나선후(남양주)", "김이나(포천)", "김한결(창동)", "박형준(창동철물)", "신태영(창동)", "민성호(창동)", "김재열(물류)"], "reps": ["한강수(창동)", "신동수(포천)", "김희규(창동)", "최종혁(포천)", "신태영(창동)", "우종규(포천)", "김진형(포천)", "이은아(창동)", "홍순호(포천)", "박서하(특판)", "서동숙(특판)", "김한솔(창동)", "박기완(포천)", "김영미(창동)", "김이나(포천)", "고충현(포천)", "온라인(특판)", "나선후(금곡)", "김건오(포천)", "김한결(창동)", "민성호(창동)", "특판영업부", "김진호(금곡)", "간접부서(물류센터)", "포천영업부"], "vehicles": ["오토", "다마스", "라보", "1톤", "1.4톤", "2.5톤", "3.5톤", "4톤", "5톤", "5톤축", "25톤"], "types": ["당사", "대불", "당사+대불", "착불"]};

const GROUPS = {
  dm:  {label:"동명물류", title:"동명물류 운반비 보고서", target:'배송유형 "동명물류" 건'},
  etc: {label:"기타 배송", title:"기타 배송유형 운반비 보고서", target:'동명물류 외 배송유형 건 (용달착불·화물·택배 등)'},
  all: {label:"종합", title:"종합 운반비 보고서", target:'전체 배송유형 (동명물류 + 기타 배송)'},
  flt: {label:"필터", title:"배송유형별 운반비 보고서", target:'선택한 배송유형 건'},
};
const BRANCH_ORDER = ["창동","포천","남양주","특판","물류","금곡"];
const WEEKDAYS = ["일","월","화","수","목","금","토"];
const fmt = n => (n||0).toLocaleString("ko-KR");

const isoOf = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
let records = DEFAULT_RECORDS.map(r=>({...r}));
let nonFreight = [];   // 배송유형 없음/방문수령/반입 등 운반비 미발생 전표의 {date, sales}
let periodMode = "day";
let dateA = isoOf(new Date());
let dateB = dateA;
let editMode = true;
let currentTab = "dm";
let dtypeFilter = "";        // 기타 배송 탭: 배송유형 필터 (빈값=전체)

function periodRange(){
  if (periodMode==="day") return [dateA, dateA];
  if (periodMode==="week"){
    const d = new Date(dateA+"T00:00:00");
    const dow = (d.getDay()+6)%7;               // 월요일 시작
    const s = new Date(d); s.setDate(d.getDate()-dow);
    const e = new Date(s); e.setDate(s.getDate()+6);
    return [isoOf(s), isoOf(e)];
  }
  if (periodMode==="month"){
    const d = new Date(dateA+"T00:00:00");
    const s = new Date(d.getFullYear(), d.getMonth(), 1);
    const e = new Date(d.getFullYear(), d.getMonth()+1, 0);   // 말일
    return [isoOf(s), isoOf(e)];
  }
  return dateA<=dateB ? [dateA,dateB] : [dateB,dateA];
}
function inPeriod(r){
  if (!r.date) return true;                     // 날짜 미입력 행은 항상 표시
  const [s,e] = periodRange();
  return r.date>=s && r.date<=e;
}
function periodLabel(){
  const [s,e] = periodRange();
  const L = iso => { const d=new Date(iso+"T00:00:00");
    return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${WEEKDAYS[d.getDay()]})`; };
  return s===e ? L(s) : L(s)+" ~ "+L(e);
}
function periodTag(){
  const [s,e] = periodRange();
  return s===e ? s : s+"~"+e;
}

/* ═══════ 원데이터 → 변환 ═══════ */
const EXCLUDE_RE = /방문수령|반입|전표수정|출고대기|보관품|이고/;
function toNum(v){ const n = parseFloat(String(v??"").replace(/[,\s원]/g,"")); return isNaN(n)?0:n; }
function extractBranch(w){ const m=/\(([^)]+)\)/.exec(String(w||"")); return m?m[1]:""; }
function vehicleOf(note){ const m=String(note||"").match(/(\d+(?:\.\d+)?톤(?:축)?|다마스|라보|오토)/); return m?m[1]:""; }
function classifyType(note, transportType){
  const n=String(note||""), t=String(transportType||"");
  if (t.includes("착불") || (n.includes("착불") && !n.includes("당사") && !n.includes("대불")))
    return {type:"착불", flag:false};
  const dang = t.includes("당사")||n.includes("당사");
  const dae  = t.includes("대불")||n.includes("대불");
  if (dang && dae) return {type:"당사", flag:true};
  if (dae) return {type:"대불", flag:false};
  if (dang) return {type:"당사", flag:false};
  return {type:"당사", flag:true};
}
function convertRaw(rows){
  const out=[]; const nf=[]; const dates=new Set();
  rows.forEach(r=>{
    const dt = String(r["배송유형"]||"").trim();
    const d = String(r["발행일"]||"").slice(0,10);
    if (d) dates.add(d);
    if (!dt || EXCLUDE_RE.test(dt)){
      nf.push({date:d, sales:toNum(r["합계"]), branch: extractBranch(r["작성자"])});   // 비운임 매출 (방문수령·반입 등)
      return;
    }
    const cls = classifyType(r["비고"], r["운반유형"]);
    out.push({
      no:0, date:d, client:String(r["거래처명"]||""),
      dest: r["납품(현장) 주소"]?String(r["납품(현장) 주소"]):"",
      fee: toNum(r["운반비"]), type:cls.type,
      branch: extractBranch(r["작성자"]), staff:String(r["작성자"]||""),
      driver: r["기사명"]?String(r["기사명"]):"", vehicle: vehicleOf(r["비고"]),
      sales: toNum(r["합계"]), salesRep:String(r["이익부서"]||""),
      dtype: dt, group: dt.includes("동명물류")?"dm":"etc", flag: cls.flag,
    });
  });
  renumberAll(out);
  const dArr=[...dates].sort();
  return {records:out, nonFreight:nf, date:dArr.length?dArr[dArr.length-1]:""};
}
function renumberAll(recs){
  let a=0,b=0;
  recs.forEach(r=>{ r.no = (r.group==="dm") ? ++a : ++b; });
}
function tabRecords(){
  if (currentTab==="all") return records.filter(inPeriod);
  if (currentTab==="flt"){
    let rs = records.filter(inPeriod);
    if (dtypeFilter) rs = rs.filter(r=>r.dtype===dtypeFilter);
    return rs;
  }
  return records.filter(r=>r.group===currentTab && inPeriod(r));
}

/* ═══════ 집계 ═══════ */
function aggregate(recs){
  const total={cnt:recs.length,fee:0,dangsaCnt:0,dangsaFee:0,daebulCnt:0,daebulFee:0,chakbulCnt:0,chakbulFee:0,sales:0,flagCnt:0};
  const byBranch={};
  recs.forEach(r=>{
    total.fee+=r.fee; total.sales+=r.sales;
    if (r.type==="대불"){ total.daebulCnt++; total.daebulFee+=r.fee; }
    else if (r.type==="착불"){ total.chakbulCnt++; total.chakbulFee+=r.fee; }
    else { total.dangsaCnt++; total.dangsaFee+=r.fee; }
    if (r.flag) total.flagCnt++;
    const b=r.branch||"기타";
    if(!byBranch[b]) byBranch[b]={cnt:0,dangsa:0,daebul:0,chakbul:0,fee:0,sales:0,staff:{}};
    const B=byBranch[b];
    B.cnt++; B.fee+=r.fee; B.sales+=r.sales;
    if (r.type==="대불") B.daebul+=r.fee; else if (r.type==="착불") B.chakbul+=r.fee; else B.dangsa+=r.fee;
    const s=r.staff||"미지정";
    if(!B.staff[s]) B.staff[s]={cnt:0,dangsa:0,daebul:0,chakbul:0,fee:0,sales:0};
    const S=B.staff[s];
    S.cnt++; S.fee+=r.fee; S.sales+=r.sales;
    if (r.type==="대불") S.daebul+=r.fee; else if (r.type==="착불") S.chakbul+=r.fee; else S.dangsa+=r.fee;
  });
  return {total,byBranch};
}

function moneyOnly(v){ return `<td class="num-cell${!v?" zero":""}"><b>${fmt(v)}</b></td>`; }
function comboCell(i,f,val,listId,wcls,ph){
  return `<input class="einp ${wcls}" list="${listId}" data-i="${i}" data-f="${f}" value="${String(val).replace(/"/g,'&quot;')}" placeholder="${ph}">`;
}

function renderTabs(){
  const dmN = records.filter(r=>r.group==="dm" && inPeriod(r)).length;

  document.getElementById("tabs").innerHTML = `

/* ═══════ 엑셀 다운로드: 탭별 2개 시트 ═══════ */
function sheetFor(group){
  let recs = records.filter(r=>r.group===group && inPeriod(r));
  if (group==="flt") recs = records.filter(r=>inPeriod(r) && (!dtypeFilter || r.dtype===dtypeFilter));
  const isEtc = group!=="dm";
  const total = recs.reduce((a,r)=>a+r.fee,0);
  const sales = recs.reduce((a,r)=>a+r.sales,0);
  const head = ["순번","날짜"].concat(isEtc?["배송유형"]:[]).concat(
    ["업체명","도착지역","운반비","운임구분","매  출\n사업장","비용담당","기사명","차종","매출액","영업\n담당자명"]);
  const data = [
    [GROUPS[group].title + (group==="flt" && dtypeFilter ? " — " + dtypeFilter : "")],
    ["기  간:", periodTag(), "", "", total, recs.length],
    head
  ];
  recs.forEach((r,seq)=>{
    const row=[seq+1, r.date].concat(isEtc?[r.dtype]:[]).concat(
      [r.client, r.dest, r.fee, r.type+(r.flag?" (확인필요)":""), r.branch, r.staff, r.driver, r.vehicle, r.sales, r.salesRep]);
    data.push(row);
  });
  data.push([]);
  data.push(["","","","합계", total, "부가세포함", Math.round(total*1.1), "", "매출합계", sales]);
  if (group==="etc"){
    const nfR = nonFreight.filter(inPeriod);
    const nfS = nfR.reduce((a,r)=>a+r.sales,0);
    data.push(["","","","비운임 매출(방문수령·반입 등)", "", `(${nfR.length}건)`, "", "", "매출", nfS]);
  }
  data.push(["위", recs.length, "내용과 금액이 일치함을 확인합니다."]);
  data.push(["확인일자","","","확 인 자:",""]);
  const ws = XLSX.utils.aoa_to_sheet(data);
  const w = [{wch:6},{wch:11}].concat(isEtc?[{wch:18}]:[]).concat(
    [{wch:32},{wch:30},{wch:10},{wch:12},{wch:9},{wch:12},{wch:8},{wch:10},{wch:11},{wch:12}]);
  ws["!cols"]=w;
  return ws;
}
function downloadXlsx(){
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, sheetFor("dm"), "동명물류");
  XLSX.utils.book_append_sheet(wb, sheetFor("etc"), "기타배송");
  if (dtypeFilter){
    const nm = ("필터_" + dtypeFilter.replace(/[\\/?*\[\]:]/g,"")).slice(0,31);
    XLSX.utils.book_append_sheet(wb, sheetFor("flt"), nm);
  }
  XLSX.writeFile(wb, `배송유형별_운반비_${periodTag().replace(/-/g,"_")}.xlsx`);
}

document.getElementById("fileInput").addEventListener("change", e=>{
  const f=e.target.files[0]; const st=document.getElementById("status");
  if(!f) return;
  st.className="status"; st.textContent="파일을 읽는 중...";
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:"array"});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{raw:false,defval:""});
      if(!rows.length) throw new Error("데이터 행이 없습니다.");
      if(!("배송유형" in rows[0])) throw new Error("'배송유형' 열을 찾을 수 없습니다. 매입매출종합검색 형식인지 확인해주세요.");
      const {records:recs, nonFreight:nf, date}=convertRaw(rows);
      if(!recs.length) throw new Error(`배송 대상 건을 찾지 못했습니다. (전체 ${rows.length}행)`);
      records=recs; nonFreight=nf; dtypeFilter="";
      if (date){ dateA=date; dateB=date; }
      syncPeriodUI();
      render();
      const dmN=recs.filter(r=>r.group==="dm").length, etN=recs.length-dmN;
      const fl=recs.filter(r=>r.flag).length;
      st.textContent=`변환 완료: 전체 ${rows.length}행 → 동명물류 ${dmN}건 · 기타 배송 ${etN}건`+(fl?` · 확인필요 ${fl}건(⚠)`:"");
    }catch(err){ st.className="status err"; st.textContent="오류: "+err.message; }
  };
  reader.readAsArrayBuffer(f);
});

function toggleEdit(){ editMode=!editMode; render(); }
function saveCell(el){
  const i=+el.dataset.i, f=el.dataset.f;
  if(!records[i]) return;
  const raw=el.textContent.trim();
  let changed=false;
  if(f==="fee"||f==="sales"){
    const v=toNum(raw);
    if(records[i][f]!==v){ records[i][f]=v; changed=true; }
  } else {
    if(records[i][f]!==raw){ records[i][f]=raw; changed=true; }
  }
  if(changed) render();
  else if(f==="fee"||f==="sales") el.textContent=fmt(records[i][f]);
}
function saveInput(el){
  const i=+el.dataset.i, f=el.dataset.f;
  if(!records[i]) return;
  const v=el.value.trim();
  if(records[i][f]!==v){
    records[i][f]=v;
    if(f==="type") records[i].flag=false;
    render();
  }
}

  }
  if(!editMode) return;
  if(e.target.classList&&e.target.classList.contains("einp")) saveInput(e.target);
});
reportEl.addEventListener("click", e=>{
  const btn=e.target.closest("[data-act]");
  if(!btn) return;
  const act=btn.dataset.act;
  if(act==="toggleEdit"){ toggleEdit(); return; }
  if(!editMode) return;
  if(act==="del"){
    const i=+btn.dataset.i;
    if(confirm(`선택한 행(${(records[i].client||"(업체명 없음)").slice(0,20)})을 삭제할까요?`)){
      records.splice(i,1); renumberAll(records); render();
    }
  } else if(act==="clearflag"){
    records[+btn.dataset.i].flag=false; render();
  } else if(act==="add"){
    records.push({no:0,date:periodRange()[0],client:"",dest:"",fee:0,type:currentTab==="etc"?"착불":"당사",
      branch:"",staff:"",driver:"",vehicle:"",sales:0,salesRep:"",
      dtype:currentTab==="etc"?"":"★(신용)동명물류(김동규)",group:currentTab,flag:false});
    renumberAll(records); render();
    const trs=reportEl.querySelectorAll(".detail tbody tr");
    if(trs.length>1) trs[trs.length-2].scrollIntoView({block:"center"});
  }
});

/* ═══════ 콤보박스 목록 주입 ═══════ */
function fillList(id, arr){
  document.getElementById(id).innerHTML = arr.map(v=>`<option value="${v}">`).join("");
}
fillList("vehicleList", VOCAB.vehicles);
fillList("typeList",    VOCAB.types);
fillList("staffList",   VOCAB.staff);
fillList("repList",     VOCAB.reps);

const elMode=document.getElementById("periodMode");
const elA=document.getElementById("dateA");
const elB=document.getElementById("dateB");
const elSep=document.getElementById("rangeSep");
const elWeek=document.getElementById("weekInfo");
const elPrev=document.getElementById("navPrev");
const elNext=document.getElementById("navNext");
function shiftPeriod(dir){
  const d = new Date(dateA+"T00:00:00");
  if (periodMode==="day")       d.setDate(d.getDate()+dir);
  else if (periodMode==="week") d.setDate(d.getDate()+dir*7);
  else if (periodMode==="month"){ d.setDate(1); d.setMonth(d.getMonth()+dir); }
  else return;                                        // 기간 모드에서는 이동 없음
  dateA = isoOf(d); dateB = dateA;
  syncPeriodUI(); render();
}
elPrev.addEventListener("click", ()=>shiftPeriod(-1));
elNext.addEventListener("click", ()=>shiftPeriod(1));
function syncPeriodUI(){
  elMode.value=periodMode;
  elA.value=dateA; elB.value=dateB;
  elB.style.display = elSep.style.display = (periodMode==="range")?"":"none";
  elPrev.style.display = elNext.style.display = (periodMode==="range")?"none":"";
  if (periodMode==="week" || periodMode==="month"){
    const [s,e]=periodRange();
    elWeek.textContent=`${s.slice(5).replace("-","/")} ~ ${e.slice(5).replace("-","/")}`;
    elWeek.style.display="";
  } else elWeek.style.display="none";
}
elMode.addEventListener("change", ()=>{
  periodMode=elMode.value;
  if (periodMode==="day"){ dateA=isoOf(new Date()); dateB=dateA; }   // 일간 → 오늘로 초기화
  syncPeriodUI(); render();
});
elA.addEventListener("change", ()=>{ if(elA.value){ dateA=elA.value; if(periodMode!=="range") dateB=dateA; syncPeriodUI(); render(); } });
elB.addEventListener("change", ()=>{ if(elB.value){ dateB=elB.value; syncPeriodUI(); render(); } });
syncPeriodUI();


/* ═══════ 인쇄 범위 선택 ═══════ */
let prevTitle = document.title;
function printReport(brief){
  // 카카오톡·네이버·인스타 등 앱 내 브라우저는 인쇄 미지원
  if (/KAKAOTALK|NAVER\(inapp|Instagram|Line\/|FBAN|FBAV|everytimeApp|DaumApps/i.test(navigator.userAgent)){
    alert("앱 내 브라우저에서는 인쇄/PDF 저장이 지원되지 않습니다.\n화면의 메뉴(⋮ 또는 공유 버튼)에서 'Chrome으로 열기' 또는 '다른 브라우저로 열기'를 선택한 뒤 다시 시도해 주세요.");
    return;
  }
  document.body.classList.toggle("print-brief", !!brief);
  const rows = document.querySelectorAll(".sec2 tbody tr").length;
  document.body.classList.toggle("print-dense", rows > 50);
  prevTitle = document.title;
  const fTag = (currentTab==="flt" && dtypeFilter) ? "_" + dtypeFilter.replace(/[^\w가-힣]/g,"") : "";
  document.title = "운반비_" + periodTag() + fTag;      // PDF 저장 파일명
  try { window.print(); }
  catch(e){
    document.title = prevTitle;
    alert("이 브라우저에서는 인쇄 기능을 사용할 수 없습니다. Chrome, Edge, Safari 등에서 열어주세요.");
  }
}
window.addEventListener("afterprint", ()=>{
  document.body.classList.remove("print-brief");
  document.body.classList.remove("print-dense");
  document.title = prevTitle;
});
document.getElementById("btnPrintBrief").addEventListener("click", ()=>printReport(true));
document.getElementById("btnPrintFull").addEventListener("click", ()=>printReport(false));

document.getElementById("printDate").textContent =
  new Date().toLocaleString("ko-KR",{year:"2-digit",month:"numeric",day:"numeric",hour:"numeric",minute:"2-digit"});
document.getElementById("status").textContent =
  "매입매출종합검색 엑셀을 올리면 자동 변환됩니다. 관리자는 편집 후 '이 날짜로 저장'으로 구글시트에 보관할 수 있습니다.";

/* ═══════════ 로그인 ═══════════ */
const loginOverlay = document.getElementById("loginOverlay");
const loginBtn = document.getElementById("loginBtn");
const loginMsg = document.getElementById("loginMsg");

function applyRole(){
  document.body.classList.toggle("role-staff", SESSION.role==="staff");
  document.body.classList.toggle("role-admin", SESSION.role==="admin");
  const bar = document.getElementById("userBar");
  const rc = SESSION.role==="admin"
    ? '<span class="role-chip role-admin">관리자</span>'
    : '<span class="role-chip role-staff">조회</span>';
  bar.innerHTML = `${SESSION.id||""} ${rc} <a id="logoutLink">로그아웃</a>`;
  const lo = document.getElementById("logoutLink");
  if (lo) lo.addEventListener("click", logout);
  const staff = SESSION.role!=="admin";
  document.getElementById("btnCloudSave").disabled = staff;
  document.getElementById("fileInput").disabled = staff;
  document.getElementById("btnReset").disabled = staff;
  if (staff && editMode) editMode=false;
}

async function doLoginFlow(){
  const id = document.getElementById("loginId").value.trim();
  const pw = document.getElementById("loginPw").value;
  if (!id || !pw){ loginMsg.textContent="아이디와 비밀번호를 입력하세요."; return; }
  loginMsg.textContent = "확인 중...";
  loginBtn.disabled = true;
  try {
    if (!API_URL){
      SESSION = { id:id+" (오프라인)", role:"admin", token:null };
    } else {
      const r = await apiCall({ action:"login", id, pw });
      SESSION = { id:r.id, role:r.role, token:r.token };
      try { sessionStorage.setItem("freightSession", JSON.stringify(SESSION)); } catch(_){}
    }
    loginMsg.textContent = "";
    loginOverlay.style.display = "none";
    applyRole();
    render();
  } catch(err){
    loginMsg.textContent = err.message;
  } finally {
    loginBtn.disabled = false;
  }
}
function logout(){
  SESSION = { id:null, role:null, token:null };
  try { sessionStorage.removeItem("freightSession"); } catch(_){}
  document.getElementById("loginId").value="";
  document.getElementById("loginPw").value="";
  loginOverlay.style.display = "flex";
}
loginBtn.addEventListener("click", doLoginFlow);
document.getElementById("loginPw").addEventListener("keydown", e=>{ if(e.key==="Enter") doLoginFlow(); });
document.getElementById("loginId").addEventListener("keydown", e=>{ if(e.key==="Enter") document.getElementById("loginPw").focus(); });

try {
  const saved = sessionStorage.getItem("freightSession");
  if (saved){ SESSION = JSON.parse(saved); loginOverlay.style.display="none"; applyRole(); }
} catch(_){}

/* ═══════════ 구글시트 저장/불러오기 ═══════════ */
const cloudStatus = document.getElementById("cloudStatus");
function setCloud(msg, cls){ cloudStatus.textContent=msg; cloudStatus.className="status"+(cls?(" "+cls):""); }

document.getElementById("btnCloudSave").addEventListener("click", async ()=>{
  if (SESSION.role!=="admin"){ setCloud("관리자만 저장할 수 있습니다.","err"); return; }
  const d = periodRange()[0];
  const dayRecs = records.filter(r=>r.date===d);
  const dayNf   = nonFreight.filter(r=>r.date===d);
  if (!dayRecs.length && !dayNf.length){ setCloud(`${d} 에 저장할 데이터가 없습니다.`,"err"); return; }
  setCloud("저장 중...");
  try {
    const r = await apiCall({ action:"save", token:SESSION.token, date:d, records:dayRecs, nonFreight:dayNf });
    setCloud(`저장 완료: ${d} (${dayRecs.length}건) · ${r.updatedAt}`,"ok");
  } catch(err){ setCloud("저장 실패: "+err.message,"err"); }
});

document.getElementById("btnCloudLoad").addEventListener("click", async ()=>{
  setCloud("불러오는 중...");
  try {
    const [s,e] = periodRange();
    const dd = await apiCall({ action:"dates" });
    const targets = (dd.dates||[]).map(x=>x.date).filter(dt=>dt>=s && dt<=e);
    if (!targets.length){ setCloud(`구글시트에 ${s}~${e} 데이터가 없습니다.`,"err"); return; }
    records = records.filter(r=>!(r.date>=s && r.date<=e));
    nonFreight = nonFreight.filter(r=>!(r.date>=s && r.date<=e));
    for (const dt of targets){
      const one = await apiCall({ action:"load", date:dt });
      records = records.concat(one.records||[]);
      nonFreight = nonFreight.concat(one.nonFreight||[]);
    }
    renumberAll(records);
    render();
    setCloud(`불러오기 완료: ${targets.length}일치 (${records.filter(r=>r.date>=s&&r.date<=e).length}건)`,"ok");
  } catch(err){ setCloud("불러오기 실패: "+err.message,"err"); }
});

render();
</script>
